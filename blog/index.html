<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - DevDocs | Technical Tutorials & Updates</title>
    <meta name="description" content="Explore the DevDocs blog for technical tutorials, open-source insights, and documentation updates.">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="DevDocs Blog - Technical Insights">
    <meta property="og:description" content="Technical tutorials, open-source guidelines, and developer updates.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/bayeziddev/devdocs/blog/">
    <meta property="og:image" content="../assets/images/blog-og.jpg">
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DevDocs Blog">
    <meta name="twitter:description" content="Technical tutorials, open-source guidelines, and developer updates.">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="/blog/">
    
    <!-- JSON-LD Blog Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "DevDocs Blog",
        "description": "Technical insights and documentation updates.",
        "url": "/blog/",
        "publisher": {
            "@type": "Organization",
            "name": "DevDocs",
            "logo": {
                "@type": "ImageObject",
                "url": "../assets/images/logo.png"
            }
        }
    }
    </script>

    <!-- Clean UI Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/blog.css">
    
    <!-- Scripts -->
    <script src="../assets/js/app.js" defer></script>
    <script src="../assets/js/blog.js" defer></script>
</head>
<body>
    <header id="main-header"></header>

    <main>
        <!-- Clean Blog Hero Section -->
        <section class="blog-hero reveal-up" style="text-align: center; padding: 5rem 0 3rem; background: var(--bg-secondary, #f8fafc);">
            <div class="container">
                <h1 class="blog-hero-title" style="font-size: clamp(2.5rem, 8vw, 3.5rem); margin-bottom: 1rem; font-weight: 800; letter-spacing: -0.02em;">DevDocs Blog</h1>
                <p class="blog-hero-subtitle" style="font-size: 1.2rem; color: var(--text-secondary, #64748b); max-width: 700px; margin: 0 auto 2.5rem; line-height: 1.6;">
                    Technical tutorials, product updates, and open-source insights.
                </p>
                
                <div class="blog-search-bar reveal-up delay-100" style="max-width: 600px; margin: 0 auto; position: relative;">
                    <input type="text" id="blog-search-input" placeholder="Search articles..." class="blog-search-input" style="width: 100%; padding: 1rem 1rem 1rem 3rem; border-radius: 12px; border: 1px solid var(--border-color, #e2e8f0); font-size: 1rem; outline: none;">
                    <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary, #94a3b8);">🔍</span>
                </div>
                
                <div id="blog-filters" class="blog-filters reveal-up delay-200" style="margin-top: 2rem; display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap;">
                    <!-- Filters will be injected by JS -->
                </div>
            </div>
        </section>

        <!-- Blog Feed Grid -->
        <section class="container reveal-up delay-300" style="padding-bottom: 4rem;">
            <div id="blog-grid" class="blog-grid">
                <!-- Blog cards will be injected by JS -->
                <div class="loading-spinner" style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-secondary, #64748b);">
                    <p>✨ Loading posts...</p>
                </div>
            </div>
        </section>
        
        <!-- Minimal Premium Newsletter Section -->
        <section class="newsletter-section reveal-up" style="background: var(--bg-tertiary, #f1f5f9); padding: 4.5rem 2rem; border-radius: 24px; margin: 0 auto 5rem; max-width: 900px; text-align: center; border: 1px solid var(--border-color, #e2e8f0);">
            <h2 style="font-size: 2rem; color: var(--text-primary, #0f172a); margin-bottom: 1rem; font-weight: 800; letter-spacing: -0.02em;">Subscribe to the Newsletter</h2>
            <p style="color: var(--text-secondary, #475569); font-size: 1.1rem; max-width: 550px; margin: 0 auto 2.5rem; line-height: 1.6;">
                Get the latest developer updates and open-source tutorials delivered straight to your inbox. No spam.
            </p>
            
            <form action="#" style="display: flex; gap: 12px; max-width: 480px; margin: 0 auto; flex-wrap: wrap; justify-content: center;">
                <input type="email" placeholder="Email address" required style="flex: 1; min-width: 250px; padding: 14px 20px; border-radius: 10px; border: 1px solid var(--border-color, #cbd5e1); font-size: 1rem; outline: none; transition: border-color 0.2s;">
                <button type="submit" style="background: #2563eb; color: white; padding: 14px 30px; border-radius: 10px; border: none; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s, transform 0.2s;">
                    Subscribe
                </button>
            </form>
        </section>

    </main>

    <footer id="main-footer"></footer>
</body>
</html>
