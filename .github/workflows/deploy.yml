name: Deploy DevDocs & Blog

on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Added caching to speed up future builds
          
      - name: Create .nojekyll bypass
        # Prevents GitHub Pages from ignoring folders starting with underscores (e.g., _includes)
        run: touch .nojekyll
        
      - name: Install NPM Dependencies
        run: npm install
        
      - name: Build Docs and Blog HTML & JSON
        # Ensure your package.json has a "build" script that runs both docs and blog generators
        run: npm run build
        
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
